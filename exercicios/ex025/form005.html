<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <h1>Exemplos de Formulárioo</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset>
            <legend>Sexo</legend>
            <input type="radio" name="sexo" id="isxmas" value="M"> <label for="isxmas">Masculono</label> <br>
            <input type="radio" name="sexo" id="isxfem" checked value="F"> <label for="isxfem">Feminino</label>
        </fieldset>
        <fieldset>
            <legend>Esportes Favoritos</legend>
            <input type="checkbox" name="esfut" id="iesfut" checked> <label for="iesfut">Futebol</label> <br>
            <input type="checkbox" name="esbas" id="isbas"> <label for="isbas">Basquete</label> <br>
            <input type="checkbox" name="esnata" id="isnata"> <label for="isnata">Natação</label><br>
            <input type="checkbox" name="estenis" id="istenis"> <label for="istenis">Ténis</label> <br>
            <input type="checkbox" name="eskick" id="isluta" checked> <label for="isluta">Luta</label> <br>
            <input type="checkbox" name="esf1" id="isf1"> <label for="isf1">Formula 1</label> <br>
        </fieldset>

        <div>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </div>
    </form>
</body>
</html>
